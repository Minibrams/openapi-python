[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
include = [
    "openapi_python/**/*.py",
    "openapi_python/generator/templates/*",
    "openapi_python/py.typed",
]

[tool.hatch.build.targets.wheel]
include = [
    "openapi_python/**/*.py",
    "openapi_python/generator/templates/*",
    "openapi_python/py.typed",
]

[project]
name = "openapi-python"
version = "0.0.6"
description = "Autogenerated and fully typed OpenAPI Python clients with a developer-friendly, ergonomic interface."
authors = [{ name = "Anders Brams", email = "anders@brams.dk" }]

readme = "README.md"
requires-python = ">=3.12"
dependencies = ["jinja2>=3.1.0"]

[project.optional-dependencies]
httpx = ["httpx>=0.28.1"]

[project.scripts]
openapi-python = "openapi_python.cli:main"

[dependency-groups]
dev = [
    "basedpyright>=1.39.3",
    "fastapi>=0.115.12",
    "httpx>=0.28.1",
    "pytest>=8.3.5",
    "pytest-asyncio>=0.26.0",
    "pytest-xdist>=3.6.1",
    "python-multipart>=0.0.20",
    "ruff>=0.9.10",
    "twine>=6.1.0",
    "uvicorn>=0.34.0",
]

[tool.uv]
package = true

[tool.ruff.lint]
ignore = ["E712"]
extend-select = ["I"]

[tool.pyright]
include = ["./openapi_python/**/*.py"]
typeCheckingMode = "standard"
reportMissingImports = true
reportUnusedVariable = true
reportOptionalSubscript = true
reportOptionalMemberAccess = true
reportOptionalCall = true
pythonVersion = "3.12"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = ["asyncio: mark test as asyncio test"]
