[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
include = ["openpylit/**/*.py", "openpylit/py.typed"]

[tool.hatch.build.targets.wheel]
include = ["openpylit/**/*.py", "openpylit/py.typed"]

[project]
name = "openpylit"
version = "0.0.1"
description = "Autogenerated and fully typed OpenAPI Python clients with route literals and Pydantic models."
authors = [{ name = "Anders Brams", email = "anders@brams.dk" }]

readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "basedpyright>=1.39.3",
    "httpx>=0.28.1",
    "openapi-python-client>=0.26.2",
]

[project.scripts]
openpylit = "openpylit.cli:main"

[dependency-groups]
dev = [
    "fastapi>=0.115.12",
    "pytest>=8.3.5",
    "pytest-asyncio>=0.26.0",
    "pytest-xdist>=3.6.1",
    "ruff>=0.9.10",
    "twine>=6.1.0",
    "uvicorn>=0.34.0",
]

[tool.uv]
package = true

[tool.ruff.lint]
ignore = ["E712"]
extend-select = ["I"]

[tool.pyright]
include = ["./openpylit/**/*.py"]
typeCheckingMode = "standard"
reportMissingImports = true
reportUnusedVariable = true
reportOptionalSubscript = true
reportOptionalMemberAccess = true
reportOptionalCall = true
pythonVersion = "3.12"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = ["asyncio: mark test as asyncio test"]
